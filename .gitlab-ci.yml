variables:
  GIT_SUBMODULE_STRATEGY: recursive
  
stages:
  - build
  - test
  - install

build:windows-with-HDF5-static:
  stage: build
  tags:
    - win10
    - build
  script:
    - 'cmake.exe -S . -B CI/ -G "Visual Studio 16 2019" -A "x64" -DHDF5_DIR="D:/GitRepo/External_MD/work/install/2019_64_static_Release/cmake/hdf5" -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" -DBUILD_SHARED_LIBS=OFF'
    - 'cmake.exe --build CI/ --config Release --parallel 8' 
  artifacts:
    paths:
      - CI/
    expire_in: 1 day

test:windows-with-HDF5-static:
  stage: test
  needs:
    - build:windows-with-HDF5-static
  tags:
    - win10
    - test
  script:
    - cd CI/
    - 'ctest --output-on-failure -C Release'
  artifacts:
    paths:
      - CI
    expire_in: 1 day

install:windows-with-HDF5-static:
  stage: install
  needs:
    - test:windows-with-HDF5-static
  tags:
    - win10
    - build
  script:
    - 'cmake.exe --install CI --config Release'


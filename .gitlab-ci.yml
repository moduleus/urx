build:android-ubuntu-with-HDF5-static:
  stage: build
  tags:
    - android
    - ubuntu
    - build
  script:
    - export ANDROID_HOME=/home/integration/Android
    - export ANDROID_SDK_PATH=$ANDROID_HOME/Sdk
    - export ANDROID_NDK_PATH=$ANDROID_SDK_PATH/ndk/21.4.7075529
    - export ANDROID_ARM64_V8A_INSTALL_PREFIX=$ANDROID_HOME/libs/arm64-v8a
    - cmake -S . -B CI_Android/ -DCMAKE_BUILD_TYPE=Release -DCMAKE_SYSTEM_NAME=Android -DCMAKE_SYSTEM_VERSION=28 -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a -DCMAKE_ANDROID_NDK=$ANDROID_NDK_PATH -DCMAKE_ANDROID_STL_TYPE=c++_static -DCMAKE_INSTALL_PREFIX=$ANDROID_HOME/libs -DBUILD_SHARED_LIBS=OFF -DHDF5_DIR="/home/gitlab-runner/Android/libs/share/cmake/hdf5"
    - cmake --build CI_Android/ --config Release --parallel 8
  artifacts:
    paths:
      - CI_Android/
    expire_in: 1 day

install:android-ubuntu-with-HDF5-static:
  stage: install
  needs:
    - build:android-ubuntu-with-HDF5-static
  tags:
    - android
    - ubuntu
    - build
  script:
    - cmake --install CI_Android/ --config Release

